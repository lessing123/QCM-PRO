server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── En-têtes de sécurité ──────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"           always;
    add_header X-Content-Type-Options    "nosniff"              always;
    add_header X-XSS-Protection          "1; mode=block"        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Compression gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-javascript image/svg+xml;
    gzip_min_length 1024;

    # ── Taille max upload ─────────────────────────────────────────
    client_max_body_size 10M;

    # ── Proxy API → backend container ─────────────────────────────
    location /api {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Proxy Socket.io → backend (WebSocket upgrade requis) ──────
    location /socket.io {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # ── SPA routing — toutes les routes inconnues → index.html ────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache long terme pour les assets statiques (hash dans le nom)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache court pour les images ───────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Bloquer accès aux fichiers sensibles ──────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
